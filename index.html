<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japan Family Holiday Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff4f7;
      color: #3b2035;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; position: relative; overflow-x: hidden; }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(255,241,246,0.18) 0%, rgba(255,245,250,0.14) 25%, rgba(255,255,255,0.08) 55%, rgba(255,241,247,0.16) 100%);
      z-index: 0;
    }
    header { padding: 28px 22px 18px; background: #fff6f8; color: #7d2f57; }
    header h1 { margin: 0; font-size: 3rem; line-height: 1.05; letter-spacing: -.04em; font-weight: 800; color: #7d2f57; }
    .main { max-width: 1380px; margin: 0 auto; padding: 22px; }
    .tabs { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 12px; margin-bottom: 18px; }
    .tab-button { border: 1px solid #f1d5e0; background: #fff6f8; color: #7d2f57; padding: 14px 16px; border-radius: 16px; cursor: pointer; transition: all .2s ease; font-weight: 600; text-align: center; }
    .tab-button.active { background: #d880a2; color: #fff; border-color: #d880a2; }
    .panel { display: none; gap: 18px; }
    .panel.active { display: grid; }
    .page-subtitle { margin: 12px 0 0; font-size: 1rem; color: #6b3a5c; line-height: 1.5; max-width: 820px; }
    #map-panel { min-height: 720px; border-radius: 24px; overflow: hidden; border: 1px solid #f2d6e0; }
    .map-wrapper { position: relative; min-height: 720px; }
    #map { width: 100%; height: 100%; min-height: 720px; }
    .sakra-petal {
      position: fixed;
      top: -80px;
      width: 26px;
      height: 26px;
      pointer-events: none;
      z-index: 1;
      opacity: 0.96;
      animation: petal-fall linear infinite;
      background-image:
        radial-gradient(circle at 52% 12%, rgba(255,243,250,0.96), rgba(255,197,226,0.92) 24%, transparent 28%),
        radial-gradient(circle at 28% 38%, rgba(255,243,250,0.96), rgba(255,199,226,0.92) 22%, transparent 26%),
        radial-gradient(circle at 74% 38%, rgba(255,243,250,0.96), rgba(255,199,226,0.92) 22%, transparent 26%),
        radial-gradient(circle at 24% 70%, rgba(255,243,250,0.96), rgba(255,199,226,0.92) 22%, transparent 26%),
        radial-gradient(circle at 76% 70%, rgba(255,243,250,0.96), rgba(255,199,226,0.92) 22%, transparent 26%),
        radial-gradient(circle at 50% 52%, rgba(255,211,238,0.9), rgba(255,245,251,0.2) 46%, transparent 56%);
      border-radius: 50%;
      border: 1px solid rgba(255,215,233,0.18);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.28));
    }
    .custom-marker { display: grid; place-items: center; width: 52px; height: 52px; border-radius: 50%; color: #fff; font-size: 1.5rem; font-weight: 800; box-shadow: 0 0 0 4px rgba(255,255,255,.9); border: 2px solid #fff; }
    .hotel-marker { background: #d3598f; }
    .event-marker { background: #9f4f7b; }
    .idea-marker { background: #f0a7c8; }
    .restaurant-marker { background: #f57da3; }
    .attraction-marker { background: #8eb9d4; }
    .animal-marker { background: #95c46b; }
    .idea-group { border: 1px solid #f2d6e0; border-radius: 20px; padding: 12px 14px; background: #fff7fb; margin-bottom: 16px; box-shadow: 0 12px 34px rgba(158,83,110,.05); }
    .idea-group summary { list-style: none; display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 12px; font-weight: 700; padding: 10px 0; color: #7d2f57; }
    .idea-group summary::-webkit-details-marker { display: none; }
    .idea-group summary::after { content: '▼'; transition: transform .2s ease; }
    .idea-group[open] summary::after { transform: rotate(-180deg); }
    .idea-group summary span:first-child { font-size: 1rem; }
    .idea-group summary span:last-child { color: #526085; font-size: .95rem; font-weight: 600; }
    .list-controls { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .filter-buttons { display: flex; flex-wrap: wrap; gap: 10px; }
    .filter-button { border: 1px solid #c8d2e5; background: #fff; color: #1f3b6f; padding: 10px 14px; border-radius: 999px; cursor: pointer; transition: all .2s ease; font-weight: 600; }
    .filter-button.active { background: #1f3b6f; color: #fff; border-color: #1f3b6f; }
    .restaurant-filters-top { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; width: 100%; }
    .category-toggle { display: inline-flex; align-items: center; justify-content: center; border: 1px solid #f1d5e0; background: #fff6f8; color: #7d2f57; padding: 10px 14px; border-radius: 999px; cursor: pointer; transition: background .2s ease, transform .2s ease; font-weight: 700; }
    .category-toggle::after { content: '▾'; margin-left: 8px; transition: transform .2s ease; }
    .category-toggle[aria-expanded='false']::after { transform: rotate(-90deg); }
    .category-toggle:hover { background: #ffe7f3; }
    .filter-buttons { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; width: 100%; }
    .filter-buttons.open { max-height: none; }
    .filter-buttons { overflow: hidden; transition: max-height .28s ease; }
    .list-controls input { width: 100%; max-width: 480px; min-width: 220px; border: 1px solid #f2d6e0; border-radius: 999px; padding: 12px 16px; background: #fff7fb; color:#3b2035; }
    .list-grid { display: grid; gap: 16px; }
    .idea-card { background: #fff7fb; border-radius: 24px; border: 1px solid #f2d6e0; padding: 18px; display: grid; gap: 12px; box-shadow: 0 10px 30px rgba(158,83,110,.06); }
    .restaurant-fields { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 6px; }
    .restaurant-field { background: #fff; border-radius: 12px; padding: 8px 12px; color:#6f4a63; font-weight:700; font-size:0.9rem; border:1px solid #f2d6e0; }
    .restaurant-desc { margin: 10px 0 0; color: #3a4b6a; line-height: 1.7; min-height: 44px; }
    .idea-card h3 { margin: 0 0 6px; font-size: 1.05rem; color: #4a214d; }
    .idea-meta { display: flex; flex-wrap: wrap; gap: 10px; color: #6f4a63; font-size: .95rem; }
    .idea-meta span { background: #f7e3ec; border-radius: 999px; padding: 6px 12px; }
    .idea-card p { margin: 0; color: #3a4b6a; line-height: 1.7; }
    .idea-actions { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .idea-actions a, .idea-actions button { border-radius: 999px; border: 1px solid transparent; background: #b9376c; color: white; text-decoration: none; padding: 10px 16px; font-weight: 700; cursor: pointer; transition: background .2s ease, transform .2s ease; }
    .idea-actions a:hover, .idea-actions button:hover { background: #8f2b56; transform: translateY(-1px); }
    .sakura-tree {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.42;
      background-image:
        radial-gradient(circle at 14% 24%, rgba(255,208,232,0.34), transparent 18%),
        radial-gradient(circle at 22% 18%, rgba(255,222,244,0.32), transparent 20%),
        radial-gradient(circle at 12% 34%, rgba(255,214,238,0.34), transparent 18%),
        radial-gradient(circle at 18% 50%, rgba(255,229,244,0.26), transparent 20%),
        radial-gradient(circle at 18% 62%, rgba(255,240,248,0.24), transparent 18%),
        radial-gradient(circle at 24% 70%, rgba(255,226,241,0.28), transparent 20%),
        radial-gradient(circle at 38% 52%, rgba(255,240,247,0.18), transparent 16%),
        radial-gradient(circle at 10% 74%, rgba(255,242,248,0.18), transparent 16%),
        radial-gradient(circle at 35% 20%, rgba(255,192,221,0.28), transparent 18%),
        linear-gradient(180deg, rgba(255,248,250,0.18) 0%, transparent 30%),
        linear-gradient(160deg, rgba(255,234,242,0.10) 0%, transparent 50%);
      box-shadow: inset 0 0 140px rgba(255,221,235,0.16);
    }
    .sakura-tree::before,
    .sakura-tree::after {
      content: '';
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
    }
    .sakura-tree::before {
      left: 4%;
      top: 10%;
      width: 520px;
      height: 420px;
      background: radial-gradient(circle at 45% 35%, rgba(255,201,225,0.42), transparent 40%);
      filter: blur(8px);
      opacity: 0.78;
    }
    .sakura-tree::after {
      left: 12%;
      top: 44%;
      width: 350px;
      height: 260px;
      background: radial-gradient(circle at 50% 50%, rgba(255,210,229,0.22), transparent 58%);
      box-shadow: 0 0 48px rgba(255,216,237,0.14);
      opacity: 0.9;
    }
    .map-notice { display: grid; gap: 12px; padding: 18px 18px 12px; background: rgba(255,248,250,.95); border-radius: 0 0 0 24px; position: absolute; right: 18px; top: 18px; z-index: 999; width: min(360px, 92vw); box-shadow: 0 28px 60px rgba(185,57,108,.14); transition: width .24s ease, padding .24s ease, opacity .24s ease; }
    .map-notice-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .notice-toggle { border: 1px solid rgba(189,105,145,.2); background: #ffe8f2; color: #7d2f57; border-radius: 999px; padding: 8px 12px; font-size: .92rem; cursor: pointer; transition: background .2s ease, transform .2s ease; }
    .notice-toggle:hover { background: #ffd9ec; transform: translateY(-1px); }
    .map-notice strong { display: block; font-size: .98rem; color:#5f2c50; }
    .map-notice small { color:#7f5d78; line-height:1.6; }
    .map-notice.collapsed { width: 220px; padding: 14px 14px 10px; }
    .map-notice.collapsed small,
    .map-notice.collapsed .map-legend,
    .map-notice.collapsed .layer-controls { display: none; }
    .map-notice.collapsed .map-notice-header { gap: 10px; }
    .map-notice.collapsed strong::after { content: ' — click expand'; display: block; margin-top: 4px; font-size: .82rem; color: #8f5c74; }
    .map-legend { display: grid; gap: 10px; margin-top: 12px; }
    .legend-item { display: flex; align-items: center; gap: 10px; font-size: .92rem; color:#4a2c47; }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-grid; place-items: center; }
    .hotel-dot { background: #d3598f; }
    .event-dot { background: #9f4f7b; }
    .idea-dot { background: #f0a7c8; }
    .restaurant-dot { background: #f57da3; }
    .attraction-dot { background: #8eb9d4; }
    .animal-dot { background: #95c46b; }
    .leaflet-container { background: #eef4fb; }
    .custom-popup { font-family: Inter,system-ui,sans-serif; font-size: 0.94rem; line-height: 1.5; color: #3b2035; }
    .custom-popup h4 { margin: 0 0 8px; font-size: 1rem; color: #5a214d; }
    .custom-popup .popup-badge { display: inline-flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; color: #653b5f; font-size: .88rem; }
    .custom-popup .popup-badge span { background: rgba(211,112,141,.12); color:#7d2f57; border-radius: 999px; padding: 5px 10px; }
    .custom-popup a { color: #a73f73; text-decoration: none; font-weight: 700; }
    .custom-popup a:hover { text-decoration: underline; }
    .layer-controls { display: grid; gap: 8px; margin-top: 12px; }
    .layer-controls label { display:flex; align-items:center; gap: 8px; font-size:.94rem; color:#24314b; cursor:pointer; }
    .layer-controls input { width: 18px; height:18px; accent-color:#b14d7a; }
    .detail-badge { background: #f1f5fb; border-radius: 16px; padding: 10px 14px; display:flex; align-items:center; gap:8px; color:#365180; font-size:.92rem; }
    @media(max-width:980px){ .tabs { grid-template-columns: 1fr; } }
    @media(max-width:820px){ .restaurant-filters-top { flex-direction: column; align-items: stretch; } .filter-buttons { max-height: none; } }
    @media(max-width:740px){ .idea-actions { flex-direction: column; align-items: stretch; } .category-toggle { display: inline-flex; } .filter-buttons { max-height: 0; overflow: hidden; transition: max-height .28s ease; width: 100%; } .filter-buttons.open { max-height: 360px; } }
    
    /* Mobile Bottom Navigation */
    @media (max-width: 767px) {
      .tabs { display: none !important; }
      .panel { padding-bottom: 80px; }
      .map-notice { max-height: 35vh; }
      .map-notice-header { padding: 8px 12px; font-size: 0.9rem; }
    }
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      border-top: 2px solid #f2d6e0;
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      z-index: 200;
      box-shadow: 0 -4px 20px rgba(158,83,110,.12);
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    @media (max-width: 767px) {
      .mobile-nav { display: grid; }
    }
    .mobile-nav-btn {
      border: none;
      background: transparent;
      padding: 8px 4px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #6f4a63;
      font-size: 0.7rem;
      font-weight: 600;
      transition: all .2s;
      border-radius: 8px;
    }
    .mobile-nav-btn.active { color: #b9376c; background: #fff4f7; }
    .mobile-nav-btn .icon { font-size: 1.5rem; transition: transform .2s; }
    .mobile-nav-btn.active .icon { transform: scale(1.15); }
    
    /* Floating Action Button */
    .fab {
      display: none;
      position: fixed;
      bottom: calc(70px + env(safe-area-inset-bottom));
      right: 16px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #b9376c;
      color: white;
      border: none;
      box-shadow: 0 4px 16px rgba(185, 55, 108, 0.4);
      cursor: pointer;
      z-index: 150;
      font-size: 1.5rem;
      transition: all .3s;
      align-items: center;
      justify-content: center;
    }
    @media (max-width: 767px) {
      .fab { display: flex; }
      .fab.hidden { opacity: 0; pointer-events: none; transform: scale(0.8); }
    }
    .fab:active { transform: scale(0.95); }
    @keyframes petal-fall {
      0% { transform: translateY(-40px) rotate(0deg) scale(0.8); opacity: 0.85; }
      30% { opacity: 0.95; }
      60% { opacity: 0.82; }
      100% { transform: translateY(110vh) translateX(24px) rotate(560deg) scale(0.95); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="sakura-tree"></div>
  <header>
    <h1>Japan Holiday Dashboard</h1>
  </header>
  <main class="main">
    <div class="sakura-petals"></div>
    <div class="tabs">
      <button class="tab-button active" data-target="map-panel" id="mapTab">Map view</button>
      <button class="tab-button" data-target="list-panel" id="listTab">Ideas list</button>
      <button class="tab-button" data-target="restaurants-panel" id="restaurantsTab">Restaurants</button>
      <button class="tab-button" data-target="attractions-panel" id="attractionsTab">Attractions</button>
      <button class="tab-button" data-target="animalcafes-panel" id="animalCafesTab">Animal Cafes</button>
      <button class="tab-button" data-target="fulldata-panel" id="fullDataTab">Full data</button>
    </div>

    <div class="panel active" id="map-panel">
      <div class="map-wrapper">
        <div id="map"></div>
        <aside class="map-notice" aria-expanded="true">
          <div class="map-notice-header">
            <strong>Interactive map guide</strong>
            <button type="button" class="notice-toggle" aria-expanded="true">Minimise</button>
          </div>
          <small>Hover pins and routes to see details. Use the checkboxes to toggle the categories. Click a list item “See on Map” to jump to the idea.</small>
          <div class="map-legend">
            <div class="legend-item"><span class="legend-dot hotel-dot"></span> Accommodation</div>
            <div class="legend-item"><span class="legend-dot event-dot"></span> Booked events</div>
            <div class="legend-item"><span class="legend-dot idea-dot"></span> Instagram idea</div>
            <div class="legend-item"><span class="legend-dot restaurant-dot"></span> Restaurants</div>
            <div class="legend-item"><span class="legend-dot attraction-dot"></span> Attractions</div>
            <div class="legend-item"><span class="legend-dot animal-dot"></span> Animal cafes</div>
          </div>
          <div class="layer-controls">
            <label><input type="checkbox" checked id="layer-accommodation" /> Show accommodation / events</label>
            <label><input type="checkbox" checked id="layer-ideas" /> Show Instagram ideas</label>
            <label><input type="checkbox" checked id="layer-restaurants" /> Show restaurants</label>
            <label><input type="checkbox" checked id="layer-attractions" /> Show attractions</label>
            <label><input type="checkbox" checked id="layer-animalcafes" /> Show animal cafes</label>
          </div>
        </aside>
      </div>
    </div>

    <div class="panel" id="list-panel">
      <div class="list-controls">
        <div class="filter-buttons" id="legFilters">
          <button class="filter-button active" data-leg="All" type="button">All legs</button>
          <button class="filter-button" data-leg="Tokyo" type="button">Tokyo</button>
          <button class="filter-button" data-leg="Hakone" type="button">Hakone</button>
          <button class="filter-button" data-leg="Kyoto" type="button">Kyoto</button>
          <button class="filter-button" data-leg="Hiroshima" type="button">Hiroshima</button>
          <button class="filter-button" data-leg="Osaka" type="button">Osaka</button>
        </div>
        <input type="search" id="ideaSearch" placeholder="Search ideas by title, city or keyword…" />
      </div>
      <div class="list-grid" id="ideasList"></div>
    </div>
    <div class="panel" id="restaurants-panel">
      <div class="list-controls">
        <div class="restaurant-filters-top">
          <div id="restaurantCityWrap" style="display:flex;flex-direction:column;gap:8px;width:100%;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
              <div id="restaurantCityFilters" class="filter-buttons">
                <button class="filter-button active" data-city="All" type="button">All cities</button>
              </div>
              <button class="category-toggle" id="restaurantCategoryToggle" type="button" aria-expanded="true">Categories</button>
            </div>
            <div class="filter-buttons open" id="restaurantCategoryFilters">
              <button class="filter-button active" data-category="All" type="button">All categories</button>
            </div>
          </div>
        </div>
        <input type="search" id="restaurantSearch" placeholder="Search restaurants by name, cuisine, area…" />
      </div>
      <div class="list-grid" id="restaurantsList"></div>
    </div>
    <div class="panel" id="attractions-panel">
      <div class="list-controls">
        <div class="restaurant-filters-top">
          <div id="attractionCityWrap" style="display:flex;flex-direction:column;gap:8px;width:100%;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
              <div id="attractionCityFilters" class="filter-buttons">
                <button class="filter-button active" data-city="All" type="button">All cities</button>
              </div>
              <button class="category-toggle" id="attractionCategoryToggle" type="button" aria-expanded="true">Categories</button>
            </div>
            <div class="filter-buttons open" id="attractionCategoryFilters">
              <button class="filter-button active" data-category="All" type="button">All categories</button>
            </div>
          </div>
        </div>
        <input type="search" id="attractionSearch" placeholder="Search attractions by name, type, area…" />
      </div>
      <div class="list-grid" id="attractionsList"></div>
    </div>
    <div class="panel" id="animalcafes-panel">
      <div class="list-controls">
        <div class="restaurant-filters-top">
          <div id="animalCafeCityWrap" style="display:flex;flex-direction:column;gap:8px;width:100%;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
              <div id="animalCafeCityFilters" class="filter-buttons">
                <button class="filter-button active" data-city="All" type="button">All cities</button>
              </div>
              <button class="category-toggle" id="animalCafeCategoryToggle" type="button" aria-expanded="true">Categories</button>
            </div>
            <div class="filter-buttons open" id="animalCafeCategoryFilters">
              <button class="filter-button active" data-category="All" type="button">All categories</button>
            </div>
          </div>
        </div>
        <input type="search" id="animalCafeSearch" placeholder="Search animal cafes by name, animal, area…" />
      </div>
      <div class="list-grid" id="animalCafeList"></div>
    </div>
    <div class="panel" id="fulldata-panel">
      <div class="list-controls">
        <div class="restaurant-filters-top">
          <div id="fullDataCityWrap" style="display:flex;flex-direction:column;gap:8px;width:100%;">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
              <div id="fullDataCityFilters" class="filter-buttons">
                <button class="filter-button active" data-city="All" type="button">All cities</button>
              </div>
              <button class="category-toggle" id="fullDataCategoryToggle" type="button" aria-expanded="true">Categories</button>
            </div>
            <div class="filter-buttons open" id="fullDataCategoryFilters">
              <button class="filter-button active" data-category="All" type="button">All categories</button>
            </div>
          </div>
        </div>
        <input type="search" id="fullDataSearch" placeholder="Search the full dataset by name, city, category…" />
      </div>
      <div class="list-grid" id="fullDataList"></div>
    </div>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <button class="mobile-nav-btn active" data-target="map-panel">
      <span class="icon">🗺️</span>
      <span>Map</span>
    </button>
    <button class="mobile-nav-btn" data-target="restaurants-panel">
      <span class="icon">🍣</span>
      <span>Food</span>
    </button>
    <button class="mobile-nav-btn" data-target="attractions-panel">
      <span class="icon">🎯</span>
      <span>Sights</span>
    </button>
    <button class="mobile-nav-btn" data-target="fulldata-panel">
      <span class="icon">📋</span>
      <span>All</span>
    </button>
  </nav>
  
  <!-- Floating Action Button -->
  <button class="fab hidden" id="fabMap" aria-label="View map">🗺️</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>

    function secureHtml(text) {
      return String(text).replace(/[&<>"]+/g, function (s) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s];

    }

    function buildPopup(item) {
      const lines = [];
      const title = item.title || item.name || 'Details';
      lines.push(`<div class="custom-popup"><h4>${secureHtml(title)}</h4>`);
      lines.push('<div class="popup-badge"><span>' + secureHtml(item.category || item.type || 'Info') + '</span>');
      if (item.cuisine_type) lines.push(`<span>${secureHtml(item.cuisine_type)}</span>`);
      if (item.city) lines.push(`<span>${secureHtml(item.city)}</span>`);
      lines.push('</div>');
      if (item.dates) lines.push(`<div><strong>When:</strong> ${secureHtml(item.dates)}</div>`);
      if (item.approx_cost) lines.push(`<div><strong>Cost:</strong> ${secureHtml(item.approx_cost)}</div>`);
      if (item.cost_approx) lines.push(`<div><strong>Cost:</strong> ${secureHtml(item.cost_approx)}</div>`);
      if (item.cost) lines.push(`<div><strong>Cost:</strong> ${secureHtml(item.cost)}</div>`);
      if (item.tabelog_rating) lines.push(`<div><strong>Rating:</strong> ${secureHtml(item.tabelog_rating)}</div>`);
      const wait = item['Approx Wait time'] || item.approx_wait_time || item.approx_wait || item.wait;
      if (wait) lines.push(`<div><strong>Approx wait:</strong> ${secureHtml(wait)}</div>`);
      if (item.table_for_9_likelihood) lines.push(`<div><strong>Group booking:</strong> ${secureHtml(item.table_for_9_likelihood)}</div>`);
      if (item.booking_requirement) lines.push(`<div><strong>Booking:</strong> ${secureHtml(item.booking_requirement)}</div>`);
      if (item.animals && item.animals.length) lines.push(`<div><strong>Animals:</strong> ${secureHtml(item.animals.join(', '))}</div>`);
      if (item.rating && item.rating.google) lines.push(`<div><strong>Google rating:</strong> ${secureHtml(item.rating.google)}</div>`);
      lines.push(`<div style="margin:10px 0;">${secureHtml(item.detail || item.details || item.description || 'No extra details.')}</div>`);
      if (item.link) lines.push(`<div><a href="${secureHtml(item.link)}" target="_blank" rel="noreferrer">Open link</a></div>`);
      if (item.website && item.website !== item.link) lines.push(`<div><a href="${secureHtml(item.website)}" target="_blank" rel="noreferrer">Website</a></div>`);

      if (item.google_maps_link || item.google_map_link) lines.push(`<div><a href="${secureHtml(item.google_maps_link || item.google_map_link)}" target="_blank" rel="noreferrer">Google Maps</a></div>`);
      lines.push('</div>');
      return lines.join('');
    }

    function bindHoverPopup(marker) {
      let closeTimer = null;
      const popup = marker.getPopup();
      marker._stayOpen = false;

      function clearCloseTimer() {
        if (closeTimer) {
          clearTimeout(closeTimer);
          closeTimer = null;
        }
      }

      function scheduleClose() {
        clearCloseTimer();
        closeTimer = setTimeout(() => {
          const iconHovered = marker._icon && marker._icon.matches(':hover');
          const popupEl = popup.getElement();
          const popupHovered = popupEl && popupEl.matches(':hover');
          if (!marker._stayOpen && !iconHovered && !popupHovered) {
            marker.closePopup();
          }
        }, 180);
      }

      marker.on('mouseover', () => {
        marker.openPopup();
        clearCloseTimer();
      });

      marker.on('mouseout', scheduleClose);

      marker.on('click', () => {
        marker.openPopup();
        marker._stayOpen = true;
        clearCloseTimer();
      });

      marker.on('popupopen', () => {
        const popupEl = popup.getElement();
        if (!popupEl) return;
        popupEl.addEventListener('mouseenter', clearCloseTimer);
        popupEl.addEventListener('mouseleave', scheduleClose);
        if (marker._icon) {
          marker._icon.addEventListener('mouseenter', clearCloseTimer);
          marker._icon.addEventListener('mouseleave', scheduleClose);
        }
      });

      marker.on('popupclose', () => {
        marker._stayOpen = false;
        clearCloseTimer();
      });
    }

    function loadRestaurants() {

        .then(response => response.ok ? response.json() : Promise.reject(response))
        .then(data => {

          Object.entries(destinations).forEach(([area, items]) => {
            items.forEach((item, index) => {
              const parsed = /^([^()]+)(?:\s*\((.+)\))?$/.exec(area) || [];
              item.area = area;
              item.city = item.city || (parsed[1] || '').trim();
              item.suburb = item.suburb || (parsed[2] || '').trim();
              item.type = 'Restaurant';
              item.title = item.name;
              item.id = item.id || `${item.city.toLowerCase().replace(/\s+/g, '-')}-${item.suburb.toLowerCase().replace(/\s+/g, '-')}-${index}`;
              restaurantsData.push(item);

    function groupIdeasByArea(ideas) {
      const groups = {};
      ideas.forEach(idea => {
        const key = `${idea.city}||${idea.suburb}`;
        if (!groups[key]) {
          groups[key] = { city: idea.city, suburb: idea.suburb, items: [] };
        }
        groups[key].items.push(idea);
      });
      return Object.values(groups).sort((a, b) => {
        if (a.city === b.city) return a.suburb.localeCompare(b.suburb);
        return a.city.localeCompare(b.city);
      });
    }

    function focusOnAttraction(id) {
      const item = attractionsData.find(i => i.id === id);
      if (!item) return;
      document.querySelectorAll('.tab-button, .mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
      document.getElementById('mapTab').classList.add('active');
      document.querySelector('.mobile-nav-btn[data-target="map-panel"]').classList.add('active');
      document.getElementById('map-panel').classList.add('active');
      document.getElementById('fabMap').classList.add('hidden');
      if (!map.hasLayer(attractionsLayer)) {
        map.addLayer(attractionsLayer);
        document.getElementById('layer-attractions').checked = true;
      }
      map.flyTo([item.coordinates.lat, item.coordinates.lng], 12, { duration: 1.2 });
      if (item.marker) item.marker.openPopup();
    }

    function buildAnimalCafeCategoryFilters() {
      const categories = Array.from(new Set(animalCafesData
        .filter(i => selectedAnimalCafeCity === 'All' || i.city === selectedAnimalCafeCity)

      animalCafeCategoryFilters.innerHTML = '<button class="filter-button active" data-category="All" type="button">All categories</button>';
      categories.forEach(category => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'filter-button';
        button.dataset.category = category;
        button.textContent = category;
        animalCafeCategoryFilters.appendChild(button);
      });
      animalCafeCategoryFilters.querySelectorAll('.filter-button').forEach(button => {
        button.addEventListener('click', () => {
          animalCafeCategoryFilters.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          selectedAnimalCafeCategory = button.dataset.category;
          renderAnimalCafes();
          updateAnimalCafeSearch();
        });
      });
    }

    function buildAnimalCafeCityFilters() {
      const cities = Array.from(new Set(animalCafesData.map(i => i.city || 'Unknown'))).sort((a, b) => a.localeCompare(b));
      animalCafeCityFilters.innerHTML = '<button class="filter-button active" data-city="All" type="button">All cities</button>';

        button.className = 'filter-button';

        animalCafeCityFilters.appendChild(button);
      });
      animalCafeCityFilters.querySelectorAll('.filter-button').forEach(button => {
        button.addEventListener('click', () => {
          animalCafeCityFilters.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));

    function renderAnimalCafes() {
      animalCafeList.innerHTML = '';
      const filteredCafes = animalCafesData
        .filter(item => (selectedAnimalCafeCategory === 'All' || item.category === selectedAnimalCafeCategory) &&
                        (selectedAnimalCafeCity === 'All' || item.city === selectedAnimalCafeCity));
      const cityGroups = {};
      filteredCafes.forEach(item => {
        const city = item.city || 'Unknown';
        cityGroups[city] = cityGroups[city] || [];
        cityGroups[city].push(item);
      });
      Object.keys(cityGroups).sort().forEach(city => {
        const cityDetails = document.createElement('details');
        cityDetails.className = 'idea-group';
        cityDetails.open = false;
        const citySummary = document.createElement('summary');
        citySummary.innerHTML = `<span>${city}</span><span>${cityGroups[city].length} cafes</span>`;
        cityDetails.appendChild(citySummary);

        cityGroups[city].forEach(item => {
          const card = document.createElement('article');
          card.className = 'idea-card';
          card.id = `animalcafe-${item.id}`;
          card.dataset.search = [item.name, item.city, item.category, item.description, (item.animals || []).join(' ')].join(' ').toLowerCase();
          card.dataset.category = (item.category || '').toLowerCase();
          card.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
              <div>
                <h3>${item.name}</h3>
                <div class="idea-meta"><span>${item.category}</span><span>${item.city}</span><span>${item.approx_cost || ''}</span></div>
              </div>
              <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
                <a href="${item.link || '#'}" target="_blank" rel="noreferrer">Website</a>
              </div>
            </div>
            <p class="restaurant-desc">${item.description || item.detail || ''}</p>
            <div class="restaurant-fields">
              <div class="restaurant-field">Animals: ${(item.animals || []).join(', ')}</div>
              <div class="restaurant-field">Booking: ${item.booking_requirement || 'Walk-in'}</div>
            </div>
            <div class="idea-actions"><button type="button" onclick="focusOnAnimalCafe('${item.id}')">See on Map</button></div>
          `;
          cityDetails.appendChild(card);
        });

        animalCafeList.appendChild(cityDetails);
      });
    }

    function updateAnimalCafeSearch() {
      const query = animalCafeSearch.value.trim().toLowerCase();
      document.querySelectorAll('#animalCafeList .idea-group').forEach(group => {
        const cards = group.querySelectorAll('.idea-card');
        let visibleCount = 0;
        cards.forEach(card => {
          const matches = card.dataset.search.includes(query);
          card.style.display = matches ? 'grid' : 'none';
          if (matches) visibleCount += 1;
        });
        group.style.display = visibleCount ? 'block' : 'none';
        group.open = visibleCount > 0 && query !== '';
      });
    }

    function focusOnAnimalCafe(id) {
      const item = animalCafesData.find(i => i.id === id);
      if (!item) return;
      document.querySelectorAll('.tab-button, .mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
      document.getElementById('mapTab').classList.add('active');
      document.querySelector('.mobile-nav-btn[data-target="map-panel"]').classList.add('active');
      document.getElementById('map-panel').classList.add('active');
      document.getElementById('fabMap').classList.add('hidden');
      if (!map.hasLayer(animalCafesLayer)) {
        map.addLayer(animalCafesLayer);
        document.getElementById('layer-animalcafes').checked = true;
      }
      map.flyTo([item.coordinates.lat, item.coordinates.lng], 12, { duration: 1.2 });
      if (item.marker) item.marker.openPopup();
    }

    function buildFullDataFilters() {
      const cities = Array.from(new Set(fullData.map(i => i.city || 'Unknown'))).sort((a, b) => a.localeCompare(b));
      fullDataCityFilters.innerHTML = '<button class="filter-button active" data-city="All" type="button">All cities</button>';
      cities.forEach(city => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'filter-button';
        button.dataset.city = city;
        button.textContent = city;
        fullDataCityFilters.appendChild(button);
      });
      fullDataCityFilters.querySelectorAll('.filter-button').forEach(button => {
        button.addEventListener('click', () => {
          fullDataCityFilters.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          selectedFullDataCity = button.dataset.city;
          buildFullDataCategoryFilters();
          renderFullData();
          updateFullDataSearch();
        });
      });

      const categories = Array.from(new Set(fullData
        .filter(i => selectedFullDataCity === 'All' || i.city === selectedFullDataCity)
        .map(item => item.category || item.type || 'Other'))).sort((a, b) => a.localeCompare(b));
      fullDataCategoryFilters.innerHTML = '<button class="filter-button active" data-category="All" type="button">All categories</button>';
      categories.forEach(category => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'filter-button';
        button.dataset.category = category;
        button.textContent = category;
        fullDataCategoryFilters.appendChild(button);
      });
      fullDataCategoryFilters.querySelectorAll('.filter-button').forEach(button => {
        button.addEventListener('click', () => {
          fullDataCategoryFilters.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          selectedFullDataCategory = button.dataset.category;
          renderFullData();
          updateFullDataSearch();
        });
      });
    }

    function buildFullDataCategoryFilters() {
      const categories = Array.from(new Set(fullData
        .filter(i => selectedFullDataCity === 'All' || i.city === selectedFullDataCity)
        .map(item => item.category || item.type || 'Other'))).sort((a, b) => a.localeCompare(b));
      fullDataCategoryFilters.innerHTML = '<button class="filter-button active" data-category="All" type="button">All categories</button>';
      categories.forEach(category => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'filter-button';
        button.dataset.category = category;
        button.textContent = category;
        fullDataCategoryFilters.appendChild(button);
      });
      fullDataCategoryFilters.querySelectorAll('.filter-button').forEach(button => {
        button.addEventListener('click', () => {
          fullDataCategoryFilters.querySelectorAll('.filter-button').forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');
          selectedFullDataCategory = button.dataset.category;
          renderFullData();
          updateFullDataSearch();
        });
      });
    }

    function buildFullData() {
      fullData = [];
      fullData = fullData.concat(
        accommodations
          .filter(item => ['Accommodation', 'Event'].includes(item.category))
          .map(item => ({ ...item, type: item.category, category: item.category, title: item.title, detail: item.details || item.detail, link: item.link }))
      );
      fullData = fullData.concat(instagramIdeas.map(item => ({
        ...item,
        type: 'Instagram Idea',
        category: 'Instagram Idea',
        title: item.title,
        detail: item.description,
        link: item.link
      })));
      fullData = fullData.concat(restaurantsData.map(item => ({
        ...item,
        type: 'Restaurant',
        category: item.category || 'Restaurant',
        title: item.title || item.name,
        detail: item.description || item.detail,
        link: item.google_maps_link || item.link
      })));
      fullData = fullData.concat(attractionsData.map(item => ({
        ...item,
        type: 'Attraction',
        category: item.category || 'Attraction',
        title: item.title || item.name,
        detail: item.description || item.detail,
        link: item.link || item.website
      })));
      fullData = fullData.concat(animalCafesData.map(item => ({
        ...item,
        type: 'Animal Cafe',
        category: item.category || 'Animal Cafe',
        title: item.title || item.name,
        detail: item.description || item.detail,
        link: item.link || item.website
      })));
      buildFullDataFilters();
    }

    function renderFullData() {
      fullDataList.innerHTML = '';
      const filteredItems = fullData
        .filter(item => (selectedFullDataCategory === 'All' || (item.category || item.type) === selectedFullDataCategory) &&
                        (selectedFullDataCity === 'All' || item.city === selectedFullDataCity));

      // Map types to standardized groups
      const mapToGroup = (type) => {
        if (type === 'Accommodation' || type === 'Event') return 'Accommodation';
        if (type === 'Restaurant') return 'Restaurants';
        if (type === 'Instagram Idea' || type === 'Attraction') return 'Ideas & Attractions';
        if (type === 'Animal Cafe') return 'Animal Cafes';
        return 'Other';
      };

      const cityGroups = {};
      filteredItems.forEach(item => {
        const city = item.city || 'Unknown';
        const group = mapToGroup(item.type);
        cityGroups[city] = cityGroups[city] || {};
        cityGroups[city][group] = cityGroups[city][group] || [];
        cityGroups[city][group].push(item);
      });

      // Define the desired group order
      const groupOrder = ['Accommodation', 'Restaurants', 'Ideas & Attractions', 'Animal Cafes'];

      Object.keys(cityGroups).sort().forEach(city => {
        const cityDetails = document.createElement('details');
        cityDetails.className = 'idea-group';
        cityDetails.open = false;
        const citySummary = document.createElement('summary');
        const cityCount = Object.values(cityGroups[city]).reduce((s, arr) => s + arr.length, 0);
        citySummary.innerHTML = `<span>${city}</span><span>${cityCount} items</span>`;
        cityDetails.appendChild(citySummary);

        // Iterate in defined order
        groupOrder.forEach(group => {
          if (!cityGroups[city][group]) return;
          const categoryDetails = document.createElement('details');
          categoryDetails.className = 'idea-group';
          categoryDetails.open = false;
          const categorySummary = document.createElement('summary');
          categorySummary.innerHTML = `<span>${group}</span><span>${cityGroups[city][group].length}</span>`;
          categoryDetails.appendChild(categorySummary);

          cityGroups[city][group].forEach(item => {
            const card = document.createElement('article');
            card.className = 'idea-card';
            card.id = `full-${item.type.toLowerCase().replace(/\s+/g, '-')}-${item.id}`;
            card.dataset.search = [item.title, item.city, item.category, item.type, item.detail, item.description, (item.animals || []).join(' ')].join(' ').toLowerCase();
            card.dataset.category = (item.category || item.type || '').toLowerCase();

            const extraFields = [];
            if (item.type === 'Restaurant') {
              const wait = item['Approx Wait time'] || item.approx_wait_time || item.approx_wait || item.wait || '';
              extraFields.push(`<div class="restaurant-field">Approx wait: ${wait}</div>`);
              extraFields.push(`<div class="restaurant-field">Booking: ${item.booking_requirement || 'Walk-in'}</div>`);
              extraFields.push(`<div class="restaurant-field">Cost: ${item.cost_approx || item.cost || ''}</div>`);
            }
            if (item.type === 'Attraction') {
              extraFields.push(`<div class="restaurant-field">Booking: ${item.booking_requirement || 'Walk-in'}</div>`);
              extraFields.push(`<div class="restaurant-field">Cost: ${item.approx_cost || ''}</div>`);
            }
            if (item.type === 'Animal Cafe') {
              extraFields.push(`<div class="restaurant-field">Animals: ${(item.animals || []).join(', ')}</div>`);
              extraFields.push(`<div class="restaurant-field">Booking: ${item.booking_requirement || 'Walk-in'}</div>`);
            }
            if (item.type === 'Instagram Idea') {
              extraFields.push(`<div class="restaurant-field">Cost: ${item.cost || ''}</div>`);
            }
            if (item.type === 'Accommodation' || item.type === 'Event') {
              extraFields.push(`<div class="restaurant-field">Dates: ${item.dates || ''}</div>`);
            }

            // Build links section with both Google Maps and other link if available
            const linksHtml = [];
            const gmapLink = item.google_maps_link || item.google_map_link;
            const otherLink = item.website || item.tabelog_link || item.link;

            if (gmapLink) {
              linksHtml.push(`<a href="${gmapLink}" target="_blank" rel="noreferrer">Google Maps</a>`);
            }
            if (otherLink && otherLink !== gmapLink) {
              const linkLabel = item.tabelog_link ? 'Tabelog' : (item.website ? 'Website' : 'Link');
              linksHtml.push(`<a href="${otherLink}" target="_blank" rel="noreferrer">${linkLabel}</a>`);
            }

            card.innerHTML = `
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
                <div>
                  <h3>${item.title}</h3>
                  <div class="idea-meta"><span>${item.type}</span><span>${item.category || ''}</span><span>${item.city}</span></div>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
                  ${linksHtml.join('')}
                </div>
              </div>
              <p class="restaurant-desc">${item.detail || item.description || ''}</p>
              <div class="restaurant-fields">${extraFields.join('')}</div>
              <div class="idea-actions"><button type="button" onclick="focusOnFullData('${item.id}')">See on Map</button></div>
            `;
            categoryDetails.appendChild(card);
          });
          cityDetails.appendChild(categoryDetails);
        });
        fullDataList.appendChild(cityDetails);
      });
    }

    function updateFullDataSearch() {
      const query = fullDataSearch.value.trim().toLowerCase();
      document.querySelectorAll('#fullDataList .idea-group').forEach(group => {
        const cards = group.querySelectorAll('.idea-card');
        let visibleCount = 0;
        cards.forEach(card => {
          const matches = card.dataset.search.includes(query);
          card.style.display = matches ? 'grid' : 'none';
          if (matches) visibleCount += 1;
        });
        group.style.display = visibleCount ? 'block' : 'none';
        group.open = visibleCount > 0 && query !== '';
      });
    }

    function focusOnFullData(id) {
      const item = fullData.find(i => i.id === id);
      if (!item) return;
      document.querySelectorAll('.tab-button, .mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
      document.getElementById('mapTab').classList.add('active');
      document.querySelector('.mobile-nav-btn[data-target="map-panel"]').classList.add('active');
      document.getElementById('map-panel').classList.add('active');
      document.getElementById('fabMap').classList.add('hidden');
      const layerMap = {
        'Restaurant': restaurantsLayer,
        'Attraction': attractionsLayer,
        'Animal Cafe': animalCafesLayer,
        'Instagram Idea': ideasLayer,
        'Accommodation': accommodationLayer,
        'Event': accommodationLayer
      };
      const checkboxMap = {
        'Restaurant': 'layer-restaurants',
        'Attraction': 'layer-attractions',
        'Animal Cafe': 'layer-animalcafes',
        'Instagram Idea': 'layer-ideas',
        'Accommodation': 'layer-accommodation',
        'Event': 'layer-accommodation'
      };
      const itemLayer = layerMap[item.type];
      if (itemLayer && !map.hasLayer(itemLayer)) {
        map.addLayer(itemLayer);
        const checkbox = document.getElementById(checkboxMap[item.type]);
        if (checkbox) checkbox.checked = true;
      }
      map.flyTo([item.lat || item.coordinates?.lat || item.latitude, item.lng || item.coordinates?.lng || item.longitude], 12, { duration: 1.2 });
      if (item.marker) item.marker.openPopup();
    }

    renderIdeas();
    Promise.allSettled([loadRestaurants(), loadAttractions(), loadAnimalCafes()]).then(() => {
      buildFullData();
      renderFullData();
      if (fullDataCategoryToggle) {
        fullDataCategoryToggle.addEventListener('click', () => {
          const expanded = fullDataCategoryFilters.classList.toggle('open');
          fullDataCategoryToggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        });
      }
    });

    const legButtons = document.querySelectorAll('#legFilters .filter-button');
    legButtons.forEach(button => {
      button.addEventListener('click', () => {
        legButtons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        selectedLeg = button.dataset.leg;
        renderIdeas();
        updateSearchAndFilter();
      });
    });

    ideaSearch.addEventListener('input', updateSearchAndFilter);
    restaurantSearch.addEventListener('input', updateRestaurantSearch);
    attractionSearch.addEventListener('input', updateAttractionSearch);
    animalCafeSearch.addEventListener('input', updateAnimalCafeSearch);
    fullDataSearch.addEventListener('input', updateFullDataSearch);

    const mapNotice = document.querySelector('.map-notice');
    const noticeToggle = document.querySelector('.notice-toggle');
    if (noticeToggle && mapNotice) {
      noticeToggle.addEventListener('click', () => {
        const collapsed = mapNotice.classList.toggle('collapsed');
        noticeToggle.textContent = collapsed ? 'Expand' : 'Minimise';
        noticeToggle.setAttribute('aria-expanded', String(!collapsed));
        mapNotice.setAttribute('aria-expanded', String(!collapsed));
      });
    }

    // Desktop tab navigation
    document.querySelectorAll('.tab-button').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(button.dataset.target).classList.add('active');
        
        // Update FAB visibility
        const fab = document.getElementById('fabMap');
        if (button.dataset.target === 'map-panel') {
          fab.classList.add('hidden');
        } else {
          fab.classList.remove('hidden');
        }
        
        if (button.dataset.target === 'map-panel' && typeof map !== 'undefined') {
          setTimeout(() => map.invalidateSize(), 100);
        }
      });
    });

    // Mobile bottom navigation
    document.querySelectorAll('.mobile-nav-btn').forEach(button => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        button.classList.add('active');
        document.getElementById(button.dataset.target).classList.add('active');
        
        // Update FAB visibility
        const fab = document.getElementById('fabMap');
        if (button.dataset.target === 'map-panel') {
          fab.classList.add('hidden');
        } else {
          fab.classList.remove('hidden');
        }
        
        if (button.dataset.target === 'map-panel' && typeof map !== 'undefined') {
          setTimeout(() => map.invalidateSize(), 100);
        }
      });
    });

    // Floating Action Button
    const fabMap = document.getElementById('fabMap');
    if (fabMap) {
      fabMap.addEventListener('click', () => {
        document.querySelectorAll('.tab-button, .mobile-nav-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));
        document.querySelector('.tab-button[data-target="map-panel"]').classList.add('active');
        document.querySelector('.mobile-nav-btn[data-target="map-panel"]').classList.add('active');
        document.getElementById('map-panel').classList.add('active');
        fabMap.classList.add('hidden');
        if (typeof map !== 'undefined') {
          setTimeout(() => map.invalidateSize(), 100);
        }
      });
    }

    function createPetals() {
      const container = document.querySelector('.sakura-petals');
      if (!container) return;
      for (let i = 0; i < 14; i += 1) {
        const petal = document.createElement('div');
        petal.className = 'sakra-petal';
        petal.style.left = `${Math.random() * 100}vw`;
        petal.style.animationDuration = `${8 + Math.random() * 8}s`;
        petal.style.animationDelay = `${Math.random() * 3}s`;
        petal.style.width = `${14 + Math.random() * 16}px`;
        petal.style.height = `${14 + Math.random() * 16}px`;
        petal.style.opacity = 0.7 + Math.random() * 0.25;
        petal.style.transform = `rotate(${Math.random() * 360}deg)`;
        container.appendChild(petal);
      }
    }

    createPetals();
  </script>
